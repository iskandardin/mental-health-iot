[env:esp32]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

lib_deps =
    bodmer/TFT_eSPI @ ^2.4.70
    Wire
    SPI
    WiFi
    PubSubClient
    ArduinoJson

build_flags =
    -DCORE_DEBUG_LEVEL=3

[env:debug]
inherit-before = env:esp32
build_flags =
    -g
    -O0
